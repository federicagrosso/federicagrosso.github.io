<!-- Script per caricare automaticamente le ultime 2 voci -->
<script>
async function loadLatest(containerId, filePath) {
    const container = document.getElementById(containerId);
    try {
        const response = await fetch(filePath);
        const text = await response.text();

        // Trasforma il file HTML in DOM
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");

        // Prendi i div dei post/pipeline
        const items = doc.querySelectorAll("#blog-posts .blog-post-item");
        if (items.length === 0) return;

        // Mostra solo i primi 2
        for (let i = 0; i < Math.min(2, items.length); i++) {
            const clone = items[i].cloneNode(true);
            container.appendChild(clone);
        }
    } catch (err) {
        console.error("Error loading latest content:", err);
    }
}

// Carica ultimi 2 post e ultime 2 pipelines
loadLatest("latest-posts", "posts/index.html");
loadLatest("latest-pipelines", "pipelines/index.html");
</script>
