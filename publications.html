<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federica Grosso</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-container">
        <div class="nav-name">Federica Grosso</div>
        <ul>
            <li><a href="https://federicagrosso.github.io/#about">Home</a></li>
            <li><a href="https://federicagrosso.github.io/#news">News</a></li>
            <li><a href="publications.html">Publications</a></li>
            <li><a href="CV.html">CV</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
    </div>
</nav>

<main>
<section id="publications">
    <h1>Selected Publications</h1>
    <p class="section-note">
        Full list on my <a href="https://scholar.google.com/citations?user=YOUR_ID" target="_blank">Google Scholar</a> · * equal contribution
    </p>
    <div id="publications-list">
        <!-- Rendered by publications.js -->
    </div>
</section>
</main>

<footer>
    <p>© 2026 Federica Grosso</p>
</footer>

<script src="publications.js"></script>
<script src="publications.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const list = document.getElementById('publications-list');

    publications.forEach(pub => {
        // Badge opzionale
        const badgeHTML = pub.badge
            ? `<span class="pub-badge pub-badge--review">${pub.badge}</span>`
            : '';

        const item = document.createElement('div');
        item.className = 'pub-card';

        item.innerHTML = `
            <div class="pub-title">
                <a href="${pub.url}" target="_blank">${pub.title}</a>
            </div>
            <div class="pub-authors">${pub.authors}</div>
            <div class="pub-meta">
                <span>${pub.venue}</span>
                ${badgeHTML} 
                <span>${pub.year}</span>
            </div>
        `;

        list.appendChild(item);
    });
});
</script>
</body>
</html>
